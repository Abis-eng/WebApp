name: Deploy Staging to GitHub Pages

# Note: Free GitHub Pages hosts one site per repo. This workflow validates
# staging content on develop; production deploy runs from main only.

on:
  push:
    branches: ["develop"]
  workflow_dispatch:

jobs:
  staging-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate staging index.html
        run: |
          test -f staging/index.html
          echo "SUCCESS: staging/index.html is ready for deployment"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build Maven project
        run: mvn clean package -DskipTests
