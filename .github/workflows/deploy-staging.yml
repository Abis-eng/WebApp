name: Deploy Staging on Tomcat

on:
  push:
    branches: ["develop"]
  workflow_dispatch:

jobs:
  deploy-tomcat-staging:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build WAR with Maven
        run: mvn clean package -DskipTests

      - name: Build Tomcat Docker image (staging tag)
        run: docker build -t webapp:staging .

      - name: Run Tomcat on staging port (localhost in runner)
        run: |
          docker rm -f webapp-staging 2>/dev/null || true
          docker run -d --name webapp-staging -p 8081:8080 webapp:staging

      - name: Wait for Tomcat and verify staging app is live
        run: |
          echo "Waiting for Tomcat (staging)..."
          for i in $(seq 1 60); do
            if curl -sf -o /dev/null http://localhost:8081/WebApp/; then
              echo "SUCCESS: Staging WebApp is live at http://localhost:8081/WebApp/"
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: Staging Tomcat did not become ready in time"
          docker logs webapp-staging
          exit 1

      - name: Stop staging container
        if: always()
        run: docker rm -f webapp-staging

      - name: Localhost staging instructions
        run: |
          echo "=============================================="
          echo " Staging on YOUR machine (localhost):"
          echo "   mvn clean package -DskipTests"
          echo "   docker run -d -p 8081:8080 --name webapp-staging webapp:staging"
          echo " Open: http://localhost:8081/WebApp/"
          echo "=============================================="
